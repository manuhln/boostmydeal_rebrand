openapi: 3.0.3
info:
  title: 'BoostMyDeal API Documentation'
  description: 'The BoostMyDeal API provides endpoints for managing agents, phone numbers, calls, workflows, payments, invoices, and more. This is a multi-tenant application requiring an X-Tenant-ID header for all API requests.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost'
tags:
  -
    name: 'API Keys'
    description: ''
  -
    name: 'API Tokens'
    description: ''
  -
    name: Agents
    description: ''
  -
    name: Authentication
    description: ''
  -
    name: Calls
    description: ''
  -
    name: Dashboard
    description: ''
  -
    name: Invoices
    description: ''
  -
    name: 'Knowledge Bases'
    description: ''
  -
    name: Notifications
    description: ''
  -
    name: Onboarding
    description: ''
  -
    name: Others
    description: ''
  -
    name: Payments
    description: ''
  -
    name: 'Phone Numbers'
    description: ''
  -
    name: 'Tenant Invitations'
    description: ''
  -
    name: Tenants
    description: ''
  -
    name: 'User Preferences'
    description: ''
  -
    name: Users
    description: ''
  -
    name: Workflows
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can retrieve your API token by visiting your dashboard and clicking <b>Generate API token</b>.'
security:
  -
    default: []
paths:
  /api/v1/api-keys:
    get:
      summary: 'List all API keys'
      operationId: listAllAPIKeys
      description: ''
      parameters:
        -
          in: query
          name: 'filter[name]'
          description: 'optional Filter by name (partial match)'
          example: architecto
          required: false
          schema:
            type: string
            description: 'optional Filter by name (partial match)'
            example: architecto
        -
          in: query
          name: 'filter[status]'
          description: 'optional Filter by status'
          example: architecto
          required: false
          schema:
            type: string
            description: 'optional Filter by status'
            example: architecto
        -
          in: query
          name: sort
          description: 'optional Sort by field (name, created_at, updated_at)'
          example: architecto
          required: false
          schema:
            type: string
            description: 'optional Sort by field (name, created_at, updated_at)'
            example: architecto
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '{"data": [{"id": 1, "name": "My App", "status": "active"}], "meta": {...}}'
      tags:
        - 'API Keys'
    post:
      summary: 'Create a new API key'
      operationId: createANewAPIKey
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name: 'My App'
                  status: active
                  last_used_at: null
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: 'My App'
                  status:
                    type: string
                    example: active
                  last_used_at:
                    type: string
                    example: null
                    nullable: true
      tags:
        - 'API Keys'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'API key name'
                  example: architecto
                key:
                  type: string
                  description: 'optional API key value (auto-generated if not provided)'
                  example: architecto
                status:
                  type: string
                  description: 'optional Key status (default: active)'
                  example: architecto
              required:
                - name
  '/api/v1/api-keys/{id}':
    get:
      summary: 'Get a specific API key'
      operationId: getASpecificAPIKey
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name: 'My App'
                  status: active
                  last_used_at: null
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: 'My App'
                  status:
                    type: string
                    example: active
                  last_used_at:
                    type: string
                    example: null
                    nullable: true
      tags:
        - 'API Keys'
    put:
      summary: 'Update an API key'
      operationId: updateAnAPIKey
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name: 'Updated App'
                  status: active
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: 'Updated App'
                  status:
                    type: string
                    example: active
      tags:
        - 'API Keys'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'optional API key name'
                  example: architecto
                status:
                  type: string
                  description: 'optional Key status'
                  example: architecto
    delete:
      summary: 'Delete an API key'
      operationId: deleteAnAPIKey
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        204:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example: {  }
                properties: {  }
      tags:
        - 'API Keys'
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the api key.'
        example: architecto
        required: true
        schema:
          type: string
      -
        in: path
        name: apiKey
        description: 'The ID of the API key'
        example: 16
        required: true
        schema:
          type: integer
  '/api/v1/api-keys/{apiKey_id}/revoke':
    post:
      summary: 'Revoke an API key'
      operationId: revokeAnAPIKey
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'API key revoked successfully'
                properties:
                  message:
                    type: string
                    example: 'API key revoked successfully'
      tags:
        - 'API Keys'
    parameters:
      -
        in: path
        name: apiKey_id
        description: 'The ID of the apiKey.'
        example: architecto
        required: true
        schema:
          type: string
      -
        in: path
        name: apiKey
        description: 'The ID of the API key'
        example: 16
        required: true
        schema:
          type: integer
  /api/v1/tokens:
    post:
      summary: 'Create a new API token'
      operationId: createANewAPIToken
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  token: 1|abc123...
                  abilities:
                    - '*'
                properties:
                  token:
                    type: string
                    example: 1|abc123...
                  abilities:
                    type: array
                    example:
                      - '*'
                    items:
                      type: string
      tags:
        - 'API Tokens'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'The token name'
                  example: architecto
                abilities:
                  type: array
                  description: 'optional The token abilities (default: all)'
                  example:
                    - architecto
                  items:
                    type: string
              required:
                - name
    get:
      summary: 'List all API tokens for the authenticated user'
      operationId: listAllAPITokensForTheAuthenticatedUser
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      name: 'My Token'
                      abilities:
                        - '*'
                      created_at: '2024-01-01T00:00:00Z'
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        name: 'My Token'
                        abilities:
                          - '*'
                        created_at: '2024-01-01T00:00:00Z'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: 'My Token'
                        abilities:
                          type: array
                          example:
                            - '*'
                          items:
                            type: string
                        created_at:
                          type: string
                          example: '2024-01-01T00:00:00Z'
      tags:
        - 'API Tokens'
  '/api/v1/tokens/{tokenId}':
    delete:
      summary: 'Delete an API token'
      operationId: deleteAnAPIToken
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Token revoked successfully'
                properties:
                  message:
                    type: string
                    example: 'Token revoked successfully'
      tags:
        - 'API Tokens'
    parameters:
      -
        in: path
        name: tokenId
        description: 'The ID of the token to delete'
        example: architecto
        required: true
        schema:
          type: string
  /api/v1/agents:
    get:
      summary: 'List all agents'
      operationId: listAllAgents
      description: ''
      parameters:
        -
          in: query
          name: name
          description: 'Filter by agent name (partial match)'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Filter by agent name (partial match)'
            example: architecto
        -
          in: query
          name: mode
          description: 'Filter by agent mode'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Filter by agent mode'
            example: architecto
        -
          in: query
          name: sort
          description: 'Sort by field (name, created_at, updated_at)'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Sort by field (name, created_at, updated_at)'
            example: architecto
        -
          in: query
          name: 'filter[phoneNumbers]'
          description: 'Include phone numbers in response'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Include phone numbers in response'
            example: architecto
        -
          in: query
          name: 'filter[knowledgeBases]'
          description: 'Include knowledge bases in response'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Include knowledge bases in response'
            example: architecto
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '{"data": [{"id": 1, "name": "Sales Agent", "mode": "voice"}], "meta": {...}}'
      tags:
        - Agents
    post:
      summary: 'Create a new agent'
      operationId: createANewAgent
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name: 'New Agent'
                  language: en
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: 'New Agent'
                  language:
                    type: string
                    example: en
      tags:
        - Agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Agent name'
                  example: architecto
                description:
                  type: string
                  description: 'optional Agent description'
                  example: 'Eius et animi quos velit et.'
                language:
                  type: string
                  description: 'Agent language code'
                  example: architecto
                mode:
                  type: string
                  description: 'optional Agent mode'
                  example: architecto
              required:
                - name
                - language
  '/api/v1/agents/{id}':
    get:
      summary: 'Get a specific agent'
      operationId: getASpecificAgent
      description: ''
      parameters:
        -
          in: query
          name: 'filter[phoneNumbers]'
          description: 'Include phone numbers in response'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Include phone numbers in response'
            example: architecto
        -
          in: query
          name: 'filter[knowledgeBases]'
          description: 'Include knowledge bases in response'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Include knowledge bases in response'
            example: architecto
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name: 'Sales Agent'
                  language: en
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: 'Sales Agent'
                  language:
                    type: string
                    example: en
      tags:
        - Agents
    put:
      summary: 'Update an agent'
      operationId: updateAnAgent
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name: 'Updated Agent'
                  language: en
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: 'Updated Agent'
                  language:
                    type: string
                    example: en
      tags:
        - Agents
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'optional Agent name'
                  example: architecto
                description:
                  type: string
                  description: 'optional Agent description'
                  example: 'Eius et animi quos velit et.'
                language:
                  type: string
                  description: 'optional Agent language code'
                  example: architecto
                mode:
                  type: string
                  description: 'optional Agent mode'
                  example: architecto
    delete:
      summary: 'Delete an agent'
      operationId: deleteAnAgent
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        204:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example: {  }
                properties: {  }
      tags:
        - Agents
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the agent.'
        example: architecto
        required: true
        schema:
          type: string
      -
        in: path
        name: agent
        description: 'The ID of the agent'
        example: 16
        required: true
        schema:
          type: integer
  /api/v1/login:
    post:
      summary: "Login to a tenant\nFinal step of the authentication flow."
      operationId: loginToATenantFinalStepOfTheAuthenticationFlow
      description: 'Uses the temporary login session (created after OTP verification) and the tenant identifier to authenticate the user within a tenant.'
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  accessToken: 1|laravel_sanctum_token
                  tenant:
                    id: tenant_123
                    name: 'Acme Inc'
                properties:
                  accessToken:
                    type: string
                    example: 1|laravel_sanctum_token
                  tenant:
                    type: object
                    properties:
                      id:
                        type: string
                        example: tenant_123
                      name:
                        type: string
                        example: 'Acme Inc'
        401:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: ''
                    type: object
                    example:
                      error: Unauthorized
                    properties:
                      error:
                        type: string
                        example: Unauthorized
                  -
                    description: ''
                    type: object
                    example:
                      error: 'Invalid session'
                    properties:
                      error:
                        type: string
                        example: 'Invalid session'
        403:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: ''
                    type: object
                    example:
                      error: 'Session mismatch'
                    properties:
                      error:
                        type: string
                        example: 'Session mismatch'
                  -
                    description: ''
                    type: object
                    example:
                      error: Forbidden
                    properties:
                      error:
                        type: string
                        example: Forbidden
      tags:
        - Authentication
      security: []
  /api/v1/me:
    get:
      summary: "Get the authenticated user's profile"
      operationId: getTheAuthenticatedUsersProfile
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  user:
                    id: 1
                    first_name: John
                    last_name: Doe
                    email: john@example.com
                  tenant:
                    id: 1
                    name: 'Acme Inc'
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      first_name:
                        type: string
                        example: John
                      last_name:
                        type: string
                        example: Doe
                      email:
                        type: string
                        example: john@example.com
                  tenant:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Acme Inc'
      tags:
        - Authentication
  /api/v1/refresh-token:
    post:
      summary: 'Refresh access token.'
      operationId: refreshAccessToken
      description: 'Accept `{refreshToken: string}` from cookies.'
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: 'array{data: array{accessToken: string}, status: bool}'
      tags:
        - Authentication
  /api/v1/logout:
    post:
      summary: Logout.
      operationId: logout
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: 'array{message: string, status: bool}'
      tags:
        - Authentication
  /api/v1/calls:
    get:
      summary: 'List all calls'
      operationId: listAllCalls
      description: ''
      parameters:
        -
          in: query
          name: 'filter[status]'
          description: 'Filter by call status'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Filter by call status'
            example: architecto
        -
          in: query
          name: 'filter[direction]'
          description: 'Filter by call direction (inbound/outbound)'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Filter by call direction (inbound/outbound)'
            example: architecto
        -
          in: query
          name: 'filter[phone_number_id]'
          description: 'Filter by phone number ID'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Filter by phone number ID'
            example: architecto
        -
          in: query
          name: 'filter[agent_id]'
          description: 'Filter by agent ID'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Filter by agent ID'
            example: architecto
        -
          in: query
          name: 'filter[from_number]'
          description: 'Filter by from number (partial match)'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Filter by from number (partial match)'
            example: architecto
        -
          in: query
          name: 'filter[to_number]'
          description: 'Filter by to number (partial match)'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Filter by to number (partial match)'
            example: architecto
        -
          in: query
          name: sort
          description: 'Sort by field (created_at, updated_at, duration_seconds, cost)'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Sort by field (created_at, updated_at, duration_seconds, cost)'
            example: architecto
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      status: completed
                      duration_seconds: 120
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        status: completed
                        duration_seconds: 120
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        status:
                          type: string
                          example: completed
                        duration_seconds:
                          type: integer
                          example: 120
      tags:
        - Calls
    post:
      summary: 'Create a new call'
      operationId: createANewCall
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-ID
          description: ''
          example: '{YOUR_TENANT_ID}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  status: completed
                  duration_seconds: 120
                properties:
                  id:
                    type: integer
                    example: 1
                  status:
                    type: string
                    example: completed
                  duration_seconds:
                    type: integer
                    example: 120
      tags:
        - Calls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone_number_id:
                  type: string
                  description: 'Phone number ID'
                  example: architecto
                agent_id:
                  type: string
                  description: 'Agent ID'
                  example: architecto
                direction:
